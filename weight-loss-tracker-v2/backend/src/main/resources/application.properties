spring.application.name=weight-loss-tracker-backend

server.port=8080

spring.datasource.url=jdbc:h2:file:./data/weight-loss-tracker-v2;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=false
spring.h2.console.path=/h2-console

app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173
app.demo-data.sample-records-enabled=false
app.spa.enabled=false

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
